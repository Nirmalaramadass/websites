<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | SEO Pro</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Emoji Icon Styles -->
    <link rel="stylesheet" href="assets/css/image-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind Config -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#0f172a',
                        secondary: '#22c55e',
                        accent: '#06b6d4'
                    },
                    fontFamily: {
                        sans: ['Poppins', 'sans-serif']
                    }
                }
            }
        }
    </script>
    
    <style>
        body { 
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        [dir="rtl"] { direction: rtl; text-align: right; }
        
        /* Glitch Animation */
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        
        .glitch {
            animation: glitch 0.3s infinite;
            display: inline-block;
        }
        
        /* Floating Animation */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .floating {
            animation: float 3s ease-in-out infinite;
        }

        body, .glass-card, input, button, a {
            transition: background-color .3s ease, color .3s ease, border-color .3s ease, box-shadow .3s ease;
        }

        html:not(.dark) body {
            background: linear-gradient(135deg, #f8fafc 0%, #dbeafe 50%, #f8fafc 100%);
        }

        html:not(.dark) .glass-card {
            background: rgba(255, 255, 255, 0.82);
            border-color: rgba(148, 163, 184, 0.35);
        }

        html:not(.dark) .text-white {
            color: #0f172a !important;
        }

        html:not(.dark) .text-gray-300 {
            color: #334155 !important;
        }

        html:not(.dark) .text-gray-400 {
            color: #475569 !important;
        }

        html:not(.dark) .bg-white\/10 {
            background-color: rgba(255, 255, 255, 0.82) !important;
        }

        html:not(.dark) .border-white\/20,
        html:not(.dark) .border-white\/30 {
            border-color: rgba(148, 163, 184, 0.45) !important;
        }

        html:not(.dark) .bg-gradient-to-r.text-white,
        html:not(.dark) .bg-gradient-to-br.text-white,
        html:not(.dark) .bg-gradient-to-r .text-white,
        html:not(.dark) .bg-gradient-to-br .text-white {
            color: #ffffff !important;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Animated Background Particles -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none">
        <canvas id="hero-particles"></canvas>
    </div>
    
    <!-- 404 Content -->
    <div class="text-center relative z-10 animate-on-scroll">
        <!-- Large 404 Text -->
        <div class="mb-8">
            <h1 class="text-[150px] lg:text-[200px] font-bold leading-none">
                <span class="bg-gradient-to-r from-secondary to-accent bg-clip-text text-transparent glitch inline-block">404</span>
            </h1>
        </div>
        
        <!-- Icon -->
        <div class="mb-8 floating">
            <i class="fas fa-rocket text-6xl text-white/50"></i>
        </div>
        
        <!-- Error Message -->
        <h2 class="text-3xl lg:text-4xl font-bold text-white mb-4">Oops! Page Not Found</h2>
        <p class="text-xl text-gray-300 mb-8 max-w-md mx-auto">
            The page you're looking for seems to have drifted into cyberspace. Let's get you back on track.
        </p>
        
        <!-- Search Bar -->
        <div class="max-w-md mx-auto mb-8">
            <div class="relative">
                <input type="text" placeholder="Search our site..." 
                    class="w-full px-6 py-4 rounded-xl bg-white/10 border-2 border-white/20 text-white placeholder-gray-400 focus:outline-none focus:border-secondary transition-colors">
                <button class="absolute right-4 top-1/2 transform -translate-y-1/2 text-white hover:text-secondary transition-colors">
                    <i class="fas fa-search text-xl"></i>
                </button>
            </div>
        </div>
        
        <!-- Action Buttons -->
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
            <a href="index.html" class="px-8 py-4 rounded-xl bg-gradient-to-r from-secondary to-accent text-white font-semibold text-lg hover:shadow-2xl hover:shadow-secondary/50 transition-all transform hover:scale-105">
                <i class="fas fa-home me-2"></i> Back to Home
            </a>
            <a href="contact.html" class="px-8 py-4 rounded-xl glass-card text-white font-semibold text-lg hover:bg-white/20 transition-all border-2 border-white/30">
                <i class="fas fa-envelope me-2"></i> Contact Support
            </a>
        </div>
        
        <!-- Quick Links -->
        <div class="mt-12 grid grid-cols-2 md:grid-cols-4 gap-4 max-w-2xl mx-auto">
            <a href="services.html" class="p-4 glass-card rounded-xl hover:bg-white/20 transition-all">
                <i class="fas fa-tools text-2xl mb-2 text-secondary"></i>
                <div class="text-sm text-white">Services</div>
            </a>
            <a href="about.html" class="p-4 glass-card rounded-xl hover:bg-white/20 transition-all">
                <i class="fas fa-users text-2xl mb-2 text-accent"></i>
                <div class="text-sm text-white">About Us</div>
            </a>
            <a href="pricing.html" class="p-4 glass-card rounded-xl hover:bg-white/20 transition-all">
                <i class="fas fa-tags text-2xl mb-2 text-secondary"></i>
                <div class="text-sm text-white">Pricing</div>
            </a>
            <a href="case-studies.html" class="p-4 glass-card rounded-xl hover:bg-white/20 transition-all">
                <i class="fas fa-chart-line text-2xl mb-2 text-accent"></i>
                <div class="text-sm text-white">Case Studies</div>
            </a>
        </div>
    </div>
    
    <script src="assets/js/main.js"></script>
    <script>
        // Initialize animations
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.animate-on-scroll').forEach(el => {
                el.classList.add('transition-all', 'duration-700');
            });
        });
    </script>
</body>
</html>
